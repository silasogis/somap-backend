services:
  db:
    build:
      context: .
      dockerfile: Dockerfile.db
    container_name: somap_db
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: somap_api
    env_file: .env
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./app:/app/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  geoserver:
    image: kartoza/geoserver:2.25.0
    container_name: somap_geoserver
    environment:
      GEOSERVER_ADMIN_USER: ${GEOSERVER_ADMIN_USER}
      GEOSERVER_ADMIN_PASSWORD: ${GEOSERVER_ADMIN_PASSWORD}
      INITIAL_MEMORY: 512M
      MAXIMUM_MEMORY: 1G
      EXTRA_JAVA_OPTS: "-Dorg.geoserver.map.turbojpeg.enabled=false"
    volumes:
      - geoserver_data:/opt/geoserver/data_dir
      - ${RASTER_PATH:-/home/umbrel/dados/raster}:/opt/geoserver/raster
      - ./setenv.sh:/usr/local/tomcat/bin/setenv.sh
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
  geoserver_data:
